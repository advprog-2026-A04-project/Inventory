name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: inventory-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run verification
        env:
          SPRING_PROFILES_ACTIVE: test
        run: ./gradlew clean test jacocoTestReport jacocoTestCoverageVerification pmdMain checkstyleMain --no-daemon

      - name: Upload CI Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            build/test-results/test/**
            build/reports/tests/test/**
            build/reports/jacoco/test/**
            build/reports/pmd/**
            build/reports/checkstyle/**
